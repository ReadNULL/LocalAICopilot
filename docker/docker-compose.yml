version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: copilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    restart: unless-stopped

